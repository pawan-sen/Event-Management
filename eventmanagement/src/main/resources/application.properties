spring.application.name=eventmanagement

spring.data.mongodb.uri=mongodb://localhost:27017/event-service
# server.servlet.context-path=/api

server.port=0
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG

logging.level.root=INFO
logging.level.com.party.eventmanagement.service=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.file.path=logs/

spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.chat.options.model=gpt-4

management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoints.web.exposure.exclude=shutdown,env,configprops,beans

management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

management.metrics.export.prometheus.enabled=true
management.metrics.distribution.percentiles-histogram.http.server.requests=true